server.port=8003
spring.application.name=runpod-worker
server.servlet.context-path=/worker/api

# Database Configuration
spring.datasource.url=jdbc:postgresql://111.111.1.11:5432/runpodworker
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Jackson Configuration
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.accept-empty-string-as-null-object=true

# Runpod API Configuration
runpod.api-token=1111111
runpod.run.path.async=/run
runpod.run.path.sync=/runsync
runpod.baseUrl=https://api.runpod.ai
runpod.serverless.id.rembg=gi2addwjw5pfrx
runpod.serverless.id.upscaler=nz2i1oqylno3r6
runpod.serverless[0].id=${runpod.serverless.id.rembg}
runpod.serverless[0].name=rembg
runpod.serverless[1].id=${runpod.serverless.id.upscaler}
runpod.serverless[1].name=upscaler
runpod.serverless.rembg.url=${runpod.baseUrl}/v2/${runpod.serverless.id.rembg}
runpod.serverless.upscaler.url=${runpod.baseUrl}/v2/${runpod.serverless.id.upscaler}
runpod.endpoint.url=${runpod.baseUrl}/v1/endpoints
# 900000 seconds = 15 menit
runpod.scheduler.serverless-status.interval=900000

# Redis Configuration
spring.data.redis.host=111.111.1.6
spring.data.redis.port=1111
spring.data.redis.password=
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

# Redis Pub/Sub Channel Names
redis.channel.job-upscaler-request=job-upscaler-request
redis.channel.job-upscaler-response=job-upscaler-response

redis.channel.job-rembg-request=job-rembg-request
redis.channel.job-rembg-response=job-rembg-response